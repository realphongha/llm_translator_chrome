<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Page Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 5h12M9 3v2M7.5 20.5L12 12l4.5 8.5M6 16h5.5M16 4l2 2m0 0l2 2m-2-2l-2 2m2-2l2-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">LLM Translator</span>
      </div>
      <div id="status-badge" class="badge badge--on">ON</div>
    </header>

    <!-- Site Info -->
    <div class="site-card">
      <div class="site-row">
        <span class="label">Site</span>
        <span id="site-hostname" class="value value--mono">—</span>
      </div>
      <div class="site-row">
        <span class="label">Prompt</span>
        <div class="select-wrapper">
          <select id="prompt-select" class="select"></select>
        </div>
      </div>
      <div class="site-row">
        <span class="label">Language</span>
        <div class="lang-pair">
          <select id="source-lang" class="select select--sm"></select>
          <span class="arrow">→</span>
          <select id="target-lang" class="select select--sm"></select>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat">
        <span class="stat__value" id="queue-count">0</span>
        <span class="stat__label">In queue</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat__value" id="translation-status">Idle</span>
        <span class="stat__label">Status</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="btn-translate" class="btn btn--primary" title="Translate page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 5h12M9 3v2M7.5 20.5L12 12l4.5 8.5M6 16h5.5M16 4l2 2m0 0l2 2m-2-2l-2 2m2-2l2-2"/>
        </svg>
        Translate
      </button>
      <button id="btn-retranslate" class="btn btn--secondary" title="Retranslate page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
        </svg>
        Retranslate
      </button>
      <button id="btn-toggle" class="btn btn--ghost" title="Pause/Resume">
        <svg id="pause-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
        <svg id="resume-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span id="toggle-label">Pause</span>
      </button>
    </div>

    <!-- Enable toggle -->
    <div class="enable-row">
      <label class="toggle-label" for="site-enabled">Enable on this site</label>
      <label class="toggle" for="site-enabled">
        <input type="checkbox" id="site-enabled" />
        <span class="toggle__track"></span>
      </label>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <button id="btn-settings" class="footer-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        Settings
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
