<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Page Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 5h12M9 3v2M7.5 20.5L12 12l4.5 8.5M6 16h5.5M16 4l2 2m0 0l2 2m-2-2l-2 2m2-2l2-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-text">LLM Translator</span>
      </div>
      <div id="status-badge" class="badge badge--on">ON</div>
    </header>

    <!-- Site Info -->
    <div class="site-card">
      <div class="site-row">
        <span class="label">Site</span>
        <span id="site-hostname" class="value value--mono">—</span>
      </div>
      <div class="site-row">
        <span class="label">Prompt</span>
        <div class="select-wrapper">
          <select id="prompt-select" class="select"></select>
        </div>
      </div>
      <div class="site-row">
        <span class="label">Language</span>
        <div class="lang-pair">
          <select id="source-lang" class="select select--sm"></select>
          <span class="arrow">→</span>
          <select id="target-lang" class="select select--sm"></select>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat">
        <span class="stat__value" id="queue-count">0</span>
        <span class="stat__label">In queue</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat__value" id="translation-status">Idle</span>
        <span class="stat__label">Status</span>
      </div>
    </div>

    <!-- Mode selector -->
    <div class="mode-row">
      <span class="label">Mode</span>
      <div class="mode-segment" id="mode-segment">
        <button class="mode-btn" data-mode="off">Off</button>
        <button class="mode-btn" data-mode="on">On</button>
        <button class="mode-btn" data-mode="auto">Auto</button>
      </div>
    </div>

    <!-- Save -->
    <div class="save-row">
      <button id="btn-save" class="btn btn--primary btn--block">Save</button>
    </div>

    <!-- Selectors & Priority (collapsible) -->
    <div id="advanced-section" class="advanced-section">
      <button id="btn-toggle-advanced" class="advanced-toggle">
        <svg class="advanced-toggle__arrow" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2l4 3-4 3"/></svg>
        Selectors &amp; Priority
        <span id="rule-count" class="badge-sm">0</span>
      </button>
      <div id="advanced-content" class="advanced-content" style="display:none">
        <div class="field">
          <label class="field__label-sm">Content Selector</label>
          <input type="text" id="adv-selector" class="input-sm" placeholder=".article p (empty = auto)" />
        </div>
        <div class="field">
          <label class="field__label-sm">Ignore Selectors</label>
          <input type="text" id="adv-ignore" class="input-sm" placeholder=".nav, .comments (comma-separated)" />
        </div>

        <div class="subsection-label">Priority Rules</div>
        <div id="priority-rules-list"></div>
        <button id="btn-add-rule" class="btn btn--sm btn--ghost add-rule-btn">+ Add Rule</button>
        <p class="field__hint">Priority 1 is processed first. Items matching no rule are processed last.</p>

        <button id="btn-scan" class="btn btn--sm btn--secondary scan-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          Scan this page
        </button>
        <div id="scan-results"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer" style="gap: 4px;">
      <button id="btn-clear-cache" class="footer-btn" title="Clear translation cache">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Clear Cache
      </button>
      <div style="width: 1px; height: 12px; background: var(--border); align-self: center;"></div>
      <button id="btn-settings" class="footer-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        Settings
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
